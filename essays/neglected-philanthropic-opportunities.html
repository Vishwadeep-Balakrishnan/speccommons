<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Essay — Speculative Commons</title>
  <meta name="description" content="Speculative Commons — rigorous analysis of neglected philanthropic opportunities.">
  <meta name="theme-color" content="#f5f3ee">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;0,7..72,600;1,7..72,400;1,7..72,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/essay.css">
</head>
<body>

  <div class="essay-page">
    <header class="essay-header" role="banner">
      <a href="../index.html" class="back-link">Speculative Commons</a>
      <nav class="nav" role="navigation" aria-label="Essay navigation">
        <a class="nav-item" href="../index.html#projects">Archive</a>
        <a class="nav-item" href="../index.html#contact">Get in touch</a>
      </nav>
    </header>

    <main role="main">
      <article>
        <!-- Hero — populated dynamically from data/essays.js -->
        <div class="essay-hero">
          <div class="essay-hero-artwork">
            <div class="essay-hero-artwork-inner" id="hero-artwork"></div>
          </div>

          <div class="essay-meta" id="essay-meta"></div>

          <h1 class="essay-title" id="essay-title"></h1>
          <p class="essay-subtitle" id="essay-subtitle"></p>
        </div>

        <!-- Essay body — Markdown content injected here -->
        <div class="essay-body" id="essay-content">
          <p style="color: var(--color-text-quiet); font-style: italic;">Loading…</p>
        </div>

        <!-- Footer -->
        <footer class="essay-footer">
          <a href="../index.html#projects" class="essay-footer-back">Back to archive</a>
          <span class="essay-footer-brand">Speculative Commons</span>
        </footer>
      </article>
    </main>
  </div>

  <!-- Essay data registry -->
  <script src="../data/essays.js"></script>

  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Essay loader -->
  <script>
  (function () {
    'use strict';

    /* ---- Extract essay slug from URL ---- */
    var path = window.location.pathname;
    var filename = path.split('/').pop() || '';
    var slug = filename.replace(/\.html$/i, '');

    if (!slug || slug === 'template') {
      showError('No essay specified.');
      return;
    }

    /* ---- Look up metadata in window.ESSAYS ---- */
    var essays = window.ESSAYS || [];
    var essay = null;
    for (var i = 0; i < essays.length; i++) {
      if (essays[i].slug === slug) {
        essay = essays[i];
        break;
      }
    }

    if (!essay) {
      showError('Essay not found.');
      return;
    }

    /* ---- Render hero from metadata ---- */
    renderHero(essay);

    /* ---- Fetch and render Markdown ---- */
    var mdUrl = slug + '.md';

    fetch(mdUrl)
      .then(function (response) {
        if (!response.ok) throw new Error('HTTP ' + response.status);
        return response.text();
      })
      .then(function (md) {
        var html = marked.parse(md);
        document.getElementById('essay-content').innerHTML = html;
      })
      .catch(function () {
        showError('Unable to load essay content. The Markdown file may be missing.');
      });

    /* ---- Helper: render hero section ---- */
    function renderHero(data) {
      /* Page title */
      document.title = data.title + ' — Speculative Commons';

      /* Meta description */
      var metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc && data.description) {
        metaDesc.setAttribute('content', data.description);
      }

      /* Cover artwork */
      var artwork = document.getElementById('hero-artwork');
      if (artwork) {
        artwork.style.setProperty('--cover-from', data.coverFrom || '#e8e5de');
        artwork.style.setProperty('--cover-to', data.coverTo || '#d8d4cb');

        if (data.coverImage) {
          var img = document.createElement('img');
          img.src = '../' + data.coverImage;
          img.alt = '';
          artwork.appendChild(img);
        }
      }

      /* Title and subtitle */
      var titleEl = document.getElementById('essay-title');
      if (titleEl) titleEl.textContent = data.title;

      var subtitleEl = document.getElementById('essay-subtitle');
      if (subtitleEl) subtitleEl.textContent = data.subtitle || '';

      /* Meta strip: tag · date · reading time */
      var metaStrip = document.getElementById('essay-meta');
      if (!metaStrip) return;

      var parts = [];

      if (data.tag) {
        parts.push('<span class="essay-meta-tag">' + escapeHTML(data.tag) + '</span>');
      }

      if (data.date) {
        parts.push('<span class="essay-meta-item">' + formatDate(data.date) + '</span>');
      }

      if (data.readingTime) {
        parts.push('<span class="essay-meta-item">' + escapeHTML(data.readingTime) + ' read</span>');
      }

      var separator = '<span class="essay-meta-separator" aria-hidden="true"></span>';
      metaStrip.innerHTML = parts.join(separator);
    }

    /* ---- Helper: format date string ---- */
    function formatDate(dateStr) {
      var months = [
        'January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'
      ];
      var parts = dateStr.split('-');
      if (parts.length < 2) return dateStr;
      var monthIndex = parseInt(parts[1], 10) - 1;
      return months[monthIndex] + ' ' + parts[0];
    }

    /* ---- Helper: escape HTML entities ---- */
    function escapeHTML(str) {
      var el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    /* ---- Helper: show error message ---- */
    function showError(message) {
      var content = document.getElementById('essay-content');
      if (content) {
        content.innerHTML = '<p style="color: var(--color-text-quiet); font-style: italic;">'
          + escapeHTML(message) + '</p>';
      }
    }
  })();
  </script>

</body>
</html>
